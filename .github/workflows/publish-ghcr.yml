name: Publish Container Images

on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: bjorkan/mqtt-to-meshcoreio-map
  IMAGE_DESCRIPTION: MQTT to MeshCore.io Map bridge that listens to a MeshCore MQTT broker and uploads verified MeshCore adverts to the MeshCore.io map.

jobs:
  publish:
    name: Publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mqtt-to-meshcoreio-map:smoke

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run -d --rm \
            -p 127.0.0.1:8080:80 \
            -e ENABLE_DASHBOARD=true \
            -e SOURCE_MQTT_URL=mqtt://127.0.0.1:9 \
            mqtt-to-meshcoreio-map:smoke)"
          trap 'docker stop "$container_id" >/dev/null' EXIT

          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/healthz | grep -qx ok; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: bjorkan
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "ghcr=${GHCR_REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.image.outputs.ghcr }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
          annotations: |
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
