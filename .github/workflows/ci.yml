name: PR CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mqtt-to-meshcoreio-map:ci

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run -d --rm \
            -p 127.0.0.1:8080:80 \
            -e ENABLE_DASHBOARD=true \
            -e SOURCE_MQTT_URL=mqtt://127.0.0.1:9 \
            mqtt-to-meshcoreio-map:ci)"
          trap 'docker stop "$container_id" >/dev/null' EXIT

          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/healthz | grep -qx ok; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1
